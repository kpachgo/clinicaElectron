name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (example: v1.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build and publish Windows EXE (x64)
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      DEBUG: electron-builder*
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            electron-app/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm run install:backend

      - name: Install electron app dependencies
        run: npm --prefix electron-app ci

      - name: Resolve release version from tag
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "RELEASE_TAG is empty"
          }
          $version = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }
          if (-not ($version -match '^\d+\.\d+\.\d+([\-+][0-9A-Za-z\.-]+)?$')) {
            throw "Invalid release tag format: '$tag'. Expected vX.Y.Z"
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved RELEASE_VERSION=$version"

      - name: Align project version with release tag
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ env.RELEASE_VERSION }}")) {
            throw "RELEASE_VERSION is empty"
          }
          node -e "const fs=require('fs'); const files=['package.json','electron-app/package.json','runtime.package.json']; const v=process.env.RELEASE_VERSION; for (const f of files){ const j=JSON.parse(fs.readFileSync(f,'utf8')); j.version=v; fs.writeFileSync(f, JSON.stringify(j, null, 2)+'\n'); console.log('updated '+f+' -> '+v); }"

      - name: Validate BACKEND_ENV secret exists
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.BACKEND_ENV }}")) {
            throw "Missing required secret: BACKEND_ENV"
          }

      - name: Detect Windows signing secrets
        shell: pwsh
        run: |
          $hasPfx = -not [string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_CERT_PFX_BASE64 }}")
          $hasPass = -not [string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_CERT_PASSWORD }}")

          if ($hasPfx -and $hasPass) {
            "HAS_WIN_SIGNING=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Windows signing secrets detected. Build will be signed."
            exit 0
          }

          if (-not $hasPfx -and -not $hasPass) {
            "HAS_WIN_SIGNING=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Windows signing secrets not found. Build will be unsigned (local parity mode)."
            exit 0
          }

          throw "Incomplete Windows signing configuration. Provide both WINDOWS_CERT_PFX_BASE64 and WINDOWS_CERT_PASSWORD, or none."

      - name: Create backend .env from GitHub Secret
        shell: pwsh
        run: |
          $path = Join-Path $PWD "backend/.env"
          $content = "${{ secrets.BACKEND_ENV }}"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($path, $content, $utf8NoBom)
          if (-not (Test-Path $path) -or ((Get-Item $path).Length -le 0)) {
            throw "backend/.env was not created correctly"
          }

      - name: Prepare Windows signing certificate
        if: env.HAS_WIN_SIGNING == 'true'
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_PFX_BASE64 }}"))
          "CSC_LINK=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_CERT_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show local electron-builder version
        shell: pwsh
        run: |
          node -e "console.log(require('./node_modules/electron-builder/package.json').version)"

      - name: Build Windows installer (x64)
        shell: pwsh
        run: |
          if ("${{ env.HAS_WIN_SIGNING }}" -eq "true") {
            Write-Host "Running signed Windows build..."
            npm run dist:win -- --x64 --config.compression=store --config.nsis.differentialPackage=false
          } else {
            Write-Host "Running unsigned Windows build (local parity)..."
            npm run dist:win:local -- --config.compression=store --config.nsis.differentialPackage=false
          }

      - name: Validate EXE output exists
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "dist-electron" -Filter "*.exe" -File -Recurse
          if (-not $exeFiles) {
            throw "No .exe generated in dist-electron/"
          }
          $exeFiles | ForEach-Object { Write-Host $_.FullName }

      - name: Validate runtime backend included in win-unpacked
        shell: pwsh
        run: |
          $runtimeServer = Get-ChildItem -Path "dist-electron" -Filter "server.js" -File -Recurse |
            Where-Object { $_.FullName -match "win-unpacked[\\/]+resources[\\/]+runtime[\\/]+backend[\\/]server\.js$" } |
            Select-Object -First 1
          if (-not $runtimeServer) {
            throw "runtime/backend/server.js not found inside win-unpacked bundle"
          }
          Write-Host $runtimeServer.FullName

      - name: Validate latest.yml output exists
        shell: pwsh
        run: |
          $latest = Get-ChildItem -Path "dist-electron" -Filter "latest.yml" -File -Recurse | Select-Object -First 1
          if (-not $latest) {
            throw "latest.yml was not generated in dist-electron/"
          }
          Write-Host $latest.FullName

      - name: Upload Windows artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ClinicaElectron-windows-exe-${{ env.RELEASE_TAG }}
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/latest.yml
          if-no-files-found: error

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/latest.yml
          fail_on_unmatched_files: false
          generate_release_notes: true
