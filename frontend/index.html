<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/serverErrorOverlay.css">

  <!-- ===== PARTE DE APP ===== -->
    <link rel="manifest" href="/manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">

<body>
<!-- ===== SIDEBAR ===== -->


<!-- ===== MAIN ===== -->
<div class="main">

    <!-- ===== TOPBAR ===== -->
    <header class="topbar">
        <div class="brand">
        </div>
        <nav class="sidebar-menu">
        <button class="accordion active">

                </svg>
            </span>
            <span class="label">Agenda</span>
        </button>
        <button class="accordion">
            <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                    <path d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"></path>

                </svg>
            </span>
            <span class="label">Paciente</span>
        </button>
        <button class="accordion">
            <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                    <path d="M8.25 6.75h12M8.25 12h12m-12 5.25h12"></path>
                    <path d="M3.75 6.75h.008v.008H3.75V6.75Zm0 5.25h.008v.008H3.75V12Zm0 5.25h.008v.008H3.75v-.008Z"></path>
                </svg>
            </span>
            <span class="label">En Cola</span>
        </button>
        <button class="accordion">
            <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                    <path d="M18 18.72a8.94 8.94 0 0 0 3.75-1.042 8.966 8.966 0 0 0-4.126-1.856M18 18.72v.01"></path>
                    <path d="M18 18.72a8.966 8.966 0 0 1-4.126-1.856M18 18.72v.82c0 .38-.214.72-.554.894A11.955 11.955 0 0 1 12 21.75c-2.332 0-4.512-.645-6.375-1.766a.998.998 0 0 1-.554-.894v-.82c0-.638.432-1.188 1.05-1.323A48.148 48.148 0 0 1 12 16.5c1.99 0 3.92.12 5.826.35.618.074 1.05.624 1.05 1.323Z"></path>
                    <path d="M12 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Zm7.5 3a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path>
                </svg>
            </span>
            <span class="label">Doctores</span>
        </button>
        <button class="accordion">
            <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                    <path d="M15.75 3.75h-7.5A2.25 2.25 0 0 0 6 6v13.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 19.5V6a2.25 2.25 0 0 0-2.25-2.25Z"></path>
                    <path d="M9.75 3h4.5a1.5 1.5 0 0 1 1.5 1.5V6h-7.5V4.5A1.5 1.5 0 0 1 9.75 3Zm0 7.5h4.5m-4.5 3h4.5m-4.5 3h4.5"></path>
                </svg>
            </span>
            <span class="label">Servicios</span>
        </button>
        <button class="accordion">
            <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                    <path d="M2.25 8.25h19.5"></path>
                    <path d="M3.75 6h16.5A1.5 1.5 0 0 1 21.75 7.5v9A1.5 1.5 0 0 1 20.25 18h-16.5A1.5 1.5 0 0 1 2.25 16.5v-9A1.5 1.5 0 0 1 3.75 6Z"></path>
                    <path d="M6 15h3.75"></path>
                </svg>
            </span>
            <span class="label">Cobro</span>
        </button>
    </nav>

        <div class="top-right">
            <button id="theme-toggle" class="theme-btn" title="Cambiar tema" aria-label="Cambiar tema">
                <span class="sun" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                        <path d="M12 3v2.25m0 13.5V21m9-9h-2.25m-13.5 0H3m15.364 6.364-1.59-1.59m-9.548 0-1.59 1.59m12.728-12.728-1.59 1.59m-9.548 0-1.59-1.59"></path>
                        <circle cx="12" cy="12" r="4.5"></circle>
                    </svg>
                </span>
                <span class="moon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                        <path d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.598.748-3.752a9.753 9.753 0 1 0 12.754 12.754Z"></path>
                    </svg>
                </span>
                <span class="vamp" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                        <path d="M12 3.75c-1.59 2.65-4.5 5.34-4.5 8.625a4.5 4.5 0 1 0 9 0c0-3.285-2.91-5.975-4.5-8.625Z"></path>
                        <path d="M9.75 12.75h4.5"></path>
                    </svg>
                </span>
                <span class="crown" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                        <path d="M9.813 15.904 9 18.75l-2.063-2.845M14.25 8.25h.008v.008h-.008V8.25Zm0 0L12 9.75l-2.25-1.5M14.25 8.25 16.5 6.75 18.75 9l-1.125 3.938M9.75 8.25 7.5 6.75 5.25 9l1.125 3.938m1.625 0h8.5"></path>
                    </svg>
                </span>
            </button>

            <div class="license-bell-wrap">
                <button
                    id="license-bell-btn"
                    type="button"
                    class="top-icon-btn license-bell-btn"
                    aria-label="Notificaciones de suscripcion"
                    aria-expanded="false"
                    aria-controls="license-bell-panel"
                >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                        <path d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.08 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"></path>
                    </svg>
                    <span id="license-bell-badge" class="license-bell-badge" hidden>!</span>
                </button>
                <div id="license-bell-panel" class="license-bell-panel" hidden>
                    <h4 id="license-bell-title" class="license-bell-title">Suscripcion</h4>
                    <p id="license-bell-message" class="license-bell-message">Sin alertas por el momento.</p>
                    <div id="license-bell-meta" class="license-bell-meta"></div>
                </div>
            </div>

            <div class="user-info">
                <div class="user-text">
                    <span class="user-name" id="top-user-name">—</span>
                    <span class="user-email" id="top-user-email">—</span>
                </div>

                <button id="btn-logout" class="btn-logout">
                    <span class="logout-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true" focusable="false">
                            <path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15"></path>
                            <path d="M18 12H9"></path>
                            <path d="m15 9 3 3-3 3"></path>
                        </svg>
                    </span>
                    <span class="logout-label">Cerrar sesión</span>
                </button>
            </div>
        </div>
    </header>

    <!-- overlay móvil -->
    <div id="sidebar-overlay" class="sidebar-overlay" hidden></div>

    <!-- ===== CONTENIDO SPA ===== -->
    <section class="content"></section>

</div>
    <!-- Aquí luego Modales -->
    <!-- ===== MODAL REGISTRAR CITA ===== -->
    <div id="modal-agenda" class="modal">
    <div class="modal-content">
        <h2>Registrar Cita</h2>

        <label>Nombre</label>
        <div class="agenda-modal-buscador">
            <input type="text" id="modal-nombre" placeholder="Nombre completo">
            <div id="modal-lista-pacientes-agenda" class="autocomplete-list"></div>
        </div>

        <label>Hora</label>

        <input list="horas-lista" id="modal-hora" placeholder="8 - 8:00 - 8:00 am">
        
        <label>Fecha</label>
        <input type="date" id="modal-fecha">
        <label>Contacto</label>
        <input type="text" id="modal-contacto" placeholder="Ej: 7979 0000">

        <label>Estado</label>
        <select id="modal-estado">
            <option value="">Pendiente</option>
            <option value="Confirmado">Confirmado</option>
            <option value="Cancelado">Cancelado</option>
            <option value="Reprogramado">Reprogramado</option>
            <option value="No contesta">No contesta</option>
            <option value="IGS">IGS</option>
        </select>

        <label>Comentario</label>
        <input type="text" id="modal-comentario" placeholder="Escriba un comentario">

        <div class="modal-buttons">
            <button id="modal-cancelar" class="btn-cancelar">Cancelar</button>
            <button id="modal-guardar" class="btn-cobrar">Guardar</button>
        </div>
    </div>
    </div>
    <!-- ===== MODAL REGISTRAR DOCTOR ===== -->
    <div id="modal-doctor" class="modal">
    <div class="modal-content">
        <h2>Registrar Doctor</h2>

        <label>Nombre</label>
        <input type="text" id="doctor-nombre" placeholder="Nombre completo">

        <label>Teléfono</label>
        <input type="text" id="doctor-telefono" placeholder="Teléfono">

        <label>Firma (dibuje abajo o suba imagen)</label>
        <input type="file" id="doctor-firma-file" class="doctor-file-input" accept="image/*">
        <canvas id="signature-canvas" class="signature-canvas"></canvas>

        <div class="signature-actions">
            <button id="btn-clear-sign" class="btn-clear-sign">Limpiar firma</button>
        </div>

        <label>Sello (subir imagen)</label>
        <input type="file" id="doctor-sello" class="doctor-file-input" accept="image/*">

        <div class="modal-buttons" style="margin-top:20px;">
            <button id="modal-doctor-cancel" class="btn-cancelar">Cancelar</button>
            <button id="modal-doctor-save" class="btn-cobrar">Guardar</button>
        </div>
    </div>
    </div>
    <!-- ===== MODAL REGISTRAR FIRMA PACIENTE ===== -->
<div id="modal-paciente-firma" class="modal modal-firma">
  <div class="modal-content modal-content-firma">
    
    <h3 class="modal-firma-title">Firma Paciente / Encargado</h3>

    <canvas
      id="canvas-firma"
      class="canvas-firma"
      width="500"
      height="180"
    ></canvas>

    <div class="modal-firma-actions">
      <button id="btn-limpiar-firma" class="btn-firma limpiar">
        Limpiar
      </button>

      <button id="btn-guardar-firma" class="btn-firma guardar">
        Guardar
      </button>

      <button id="btn-cerrar-firma" class="btn-firma cerrar">
        Cerrar
      </button>
    </div>

  </div>
</div>


<!-- Modal ver firma -->
<div id="modal-ver-firma" class="modal">
    <div class="modal-content">
        <h2>Firma</h2>
        <img id="firma-img" class="firma-img" src="" alt="Firma">
        <div class="modal-buttons" style="margin-top:14px;">
            <button id="modal-ver-cerrar" class="btn-cancelar">Cerrar</button>
        </div>
    </div>
</div>

<!-- Modal ver sello -->
<div id="modal-ver-sello" class="modal">
    <div class="modal-content">
        <h2>Sello</h2>
        <img id="sello-img" class="firma-img" src="" alt="Sello">
        <div class="modal-buttons" style="margin-top:14px;">
            <button id="modal-ver-sello-cerrar" class="btn-cancelar">Cerrar</button>
        </div>
    </div>
</div>
<!-- Modal Registrar Servicio -->
<div id="modal-servicio" class="modal">
  <div class="modal-content">
    <h2>Registrar Servicio</h2>

    <label>Nombre</label>
    <input type="text" id="servicio-nombre" placeholder="Nombre del servicio">

    <label>Precio (solo número)</label>
    <input type="number" id="servicio-precio" placeholder="Ej: 25" min="0" step="0.01">

    <div class="modal-buttons">
      <button id="modal-servicio-cancel" class="btn-cancelar">Cancelar</button>
      <button id="modal-servicio-save" class="btn-cobrar" type="button">Guardar</button>
    </div>
  </div>
</div>
<!-- Modal Registrar Cita Paciente -->
<div id="modal-cita-paciente" class="modal">
  <div class="modal-content">
    <h2>Registrar Cita del Paciente</h2>

    <label>Fecha</label>
    <input type="date" id="cita-fecha">

    <label>Procedimiento</label>
    <input type="text" id="cita-procedimiento" maxlength="500" placeholder="Ej: Limpieza, Extracción...">

    <label>Valor</label>
    <input type="number" id="cita-valor">

    <label>Abono</label>
    <input type="number" id="cita-abono">

    <label>Doctor</label>
    <select id="cita-doctor"></select>

    <div class="modal-buttons">
      <button id="modal-cita-cancel" class="btn-cancelar">Cancelar</button>
      <button id="modal-cita-save" class="btn-cobrar">Guardar</button>
    </div>
  </div>
</div>
<!-- Modal: Información del doctor -->
<div id="modal-doctor-info" class="modal modal-info-doctor">
  <div class="modal-content">
    <h2>Información del Doctor</h2>

    <div id="doctor-info-body"></div>

    <div class="modal-buttons">
      <button id="modal-doctor-info-close" class="btn-cancelar">
        Cerrar
      </button>
    </div>
  </div>
</div>
<!-- Modal: Autorizar procedimiento -->
<div id="modal-autorizar-cita" class="modal">
  <div class="modal-content">
    <h2>Autorizar Procedimiento</h2>
    <p id="autorizar-cita-doctor" class="autorizar-cita-subtitle"></p>

    <label>Contrasena</label>
    <input type="password" id="autorizar-cita-password" placeholder="Contrasena">

    <div class="modal-buttons">
      <button id="modal-autorizar-cancel" class="btn-cancelar">Cancelar</button>
      <button id="modal-autorizar-save" class="btn-cobrar">Autorizar</button>
    </div>
  </div>
</div>
<div id="menu" class="menu-hidden">
          <div class="menu-title">Seleccionar tratamiento</div>
          <div id="menu-options"></div>
          <button id="close-menu">Cerrar</button>
</div>

    <script src="js/uiSounds.js"></script>
    <script src="js/uiAlerts.js"></script>
    <script src="js/serverErrorOverlay.js"></script>
    <script src="js/animaciones.js"></script>
    <script src="js/login.js"></script>
    <script src="js/uiIcons.js"></script>
    <script src="js/web.js"></script>
    <script src="js/vendor/jspdf.umd.min.js" defer></script>
    <script src="js/vendor/jspdf.plugin.autotable.min.js" defer></script>
    <script src="js/agenda.js" defer></script>
    <script src="js/encola.js" defer></script>
    <script src="js/doctor.js" defer></script>
    <script src="js/servicios.js" defer></script>
    <script src="js/cobro.js" defer></script>
    <script src="js/reglasVisuales.js"></script>
    <script src="js/paciente.js"></script>
    <script src="js/odontograma.js"></script>
</body>
</html>
